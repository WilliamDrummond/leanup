<script>

const db = {
  async query(table, params = '') {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}${params}`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' }

  async insert(table, body) {
    const r = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },

    const r = await fetch(`${SUPA_URL}/rest/v1/${table}?${qs}`, {
      method: 'PATCH',
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body)

// Map DB snake_case rows → app camelCase
const mapUser = u => ({ id: u.id, username: u.username, password: u.password, role: u.role, name: u.name, startWeight: u.start_weight, email: u.email || '' });
const mapLog  = l => ({ id: l.id, userId: l.user_id, weight: l.weight, date: l.date, ts: l.ts });
const mapPhoto = p => ({ id: p.id, userId: p.user_id, name: p.name, week: p.week, dataUrl: p.data_url, date: p.date, ts: p.ts });
const mapContest = c => ({ startDate: c.start_date });

async function loadAll() {
  const [users, [contest], logs, photos] = await Promise.all([
    db.query('users', '?select=*').then(r => r.map(mapUser)),
    db.query('contest', '?select=*&id=eq.1').then(r => r.map(mapContest)),
    db.query('logs', '?select=*&order=date.asc').then(r => r.map(mapLog)),
    db.query('photos', '?select=*&order=ts.desc').then(r => r.map(mapPhoto)),
  ]);
  return { users, contest: contest || { startDate: null }, logs, photos };
}

const pctLost = (start, current) => +(((start - current) / start) * 100).toFixed(2);
const todayStr = () => new Date().toLocaleDateString('en-CA', { timeZone: 'Australia/Brisbane' });
const fmtDate = d => new Date(d + 'T12:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
const daysBetween = (a, b) => Math.round((new Date(b) - new Date(a)) / 86400000);

function contestDay(startDate) {
  if (!startDate) return null;
  const d = daysBetween(startDate, todayStr()) + 1;
  return d < 1 ? null : d;
}
function contestWeek(startDate) {
  const d = contestDay(startDate);
  if (!d) return null;
  return Math.min(Math.ceil(d / 7), 8);
}
function getStatus(contest) {
  if (!contest.startDate) return 'pending';
  const start = new Date(contest.startDate);
  const end = new Date(start.getTime() + 56 * 86400000);
  const now = new Date();
  if (now < start) return 'pending';
  if (now > end) return 'ended';
  return 'live';
}

function calcStats(user, myLogs, contest) {
  if (!myLogs.length) return null;
  const sorted = [...myLogs].sort((a, b) => a.date.localeCompare(b.date));
  const first = sorted[0], last = sorted[sorted.length - 1];
  const totalLost = +(first.weight - last.weight).toFixed(2);
  const weightPctLost = pctLost(first.weight, last.weight);
  const daySpan = Math.max(daysBetween(first.date, last.date), 1);
  const avgPerDay = +(totalLost / daySpan).toFixed(3);
  const pacePerWeek = +(avgPerDay * 7).toFixed(2);

  let bestDrop = 0, worstGain = 0;
  for (let i = 1; i < sorted.length; i++) {
    const diff = +(sorted[i - 1].weight - sorted[i].weight).toFixed(2);
    if (diff > bestDrop) bestDrop = diff;
    if (diff < worstGain) worstGain = diff;
  }

  // Streak
  let streak = 0;
  const logSet = new Set(sorted.map(l => l.date));
  let check = todayStr();
  while (logSet.has(check)) {
    streak++;
    const d = new Date(check); d.setDate(d.getDate() - 1);
    check = d.toISOString().slice(0, 10);
  }

  // Projection
  let daysLeft = 0, projectedFinal = null, projectedLoss = 0;
  if (contest.startDate) {
    const endDate = new Date(new Date(contest.startDate).getTime() + 56 * 86400000).toISOString().slice(0, 10);
    daysLeft = Math.max(0, daysBetween(todayStr(), endDate));
    projectedLoss = +(avgPerDay * daysLeft).toFixed(2);
    projectedFinal = +(last.weight - projectedLoss).toFixed(1);
  }

  // 7-day trend
  const recent7 = sorted.slice(-7);
  const trend = recent7.length >= 2 ? +(recent7[0].weight - recent7[recent7.length - 1].weight).toFixed(2) : 0;

  return { first, last, sorted, totalLost, weightPctLost, avgPerDay, pacePerWeek, bestDrop, worstGain, streak, daysLeft, projectedFinal, projectedLoss, trend };
}

function buildLB(users, logs) {
  return users
    .filter(u => u.role !== 'admin' && u.startWeight)
    .map(u => {
      const myLogs = logs.filter(l => l.userId === u.id).sort((a, b) => a.date.localeCompare(b.date));
      const last = myLogs[myLogs.length - 1];
      const currentWeight = last ? last.weight : u.startWeight;
      const weightPctLost = pctLost(u.startWeight, currentWeight);
      return { ...u, currentWeight, weightPctLost, logCount: myLogs.length, logDates: new Set(myLogs.map(l => l.date)) };
    })
    .sort((a, b) => b.weightPctLost - a.weightPctLost);
}

// SVG Chart
function SparkChart({ logs, height = 160 }) {
  const W = 600, H = height, PL = 52, PR = 20, PT = 16, PB = 36;
  const recent = logs.slice(-30);
  if (recent.length < 2) return React.createElement('div', { className: 'empty', style: { padding: 24 } }, 'Log at least 2 days to see your chart 📈');

  const weights = recent.map(l => l.weight);
  const minW = Math.min(...weights) - 0.5;
  const maxW = Math.max(...weights) + 0.5;
  const xs = i => PL + (i / (recent.length - 1)) * (W - PL - PR);
  const ys = w => PT + ((maxW - w) / (maxW - minW)) * (H - PT - PB);
  const pts = recent.map((l, i) => [xs(i), ys(l.weight)]);
  const linePath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${(H-PB).toFixed(1)} L${PL},${(H-PB).toFixed(1)} Z`;

  // Y ticks
  const yTicks = [minW, minW + (maxW - minW) * 0.25, minW + (maxW - minW) * 0.5, minW + (maxW - minW) * 0.75, maxW].map(v => ({ v: +v.toFixed(1), y: ys(v) }));
  // X labels
  const xIdxs = recent.length <= 7 ? recent.map((_, i) => i) : [0, Math.floor(recent.length / 3), Math.floor(recent.length * 2 / 3), recent.length - 1];

  // Trend line
  const n = pts.length, sx = pts.reduce((s, _, i) => s + i, 0), sy = pts.reduce((s, p) => s + p[1], 0);
  const sxy = pts.reduce((s, p, i) => s + i * p[1], 0), sx2 = pts.reduce((s, _, i) => s + i * i, 0);
  const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
  const intercept = (sy - slope * sx) / n;

  return React.createElement('div', { className: 'chart-wrap' },
    React.createElement('svg', { viewBox: `0 0 ${W} ${H}`, style: { width: '100%', display: 'block' }, preserveAspectRatio: 'none' },
      React.createElement('defs', null,
        React.createElement('linearGradient', { id: 'ag', x1: 0, y1: 0, x2: 0, y2: 1 },
          React.createElement('stop', { offset: '0%', stopColor: '#e8ff47', stopOpacity: 0.18 }),
          React.createElement('stop', { offset: '100%', stopColor: '#e8ff47', stopOpacity: 0 })
        )
      ),
      yTicks.map((t, i) => React.createElement('g', { key: i },
        React.createElement('line', { x1: PL, y1: t.y, x2: W - PR, y2: t.y, stroke: '#2a2a2a', strokeWidth: 1 }),
        React.createElement('text', { x: PL - 6, y: t.y + 4, textAnchor: 'end', fill: '#666', fontSize: 10, fontFamily: 'DM Mono' }, t.v)
      )),
      xIdxs.map(i => React.createElement('text', { key: i, x: xs(i), y: H - PB + 18, textAnchor: 'middle', fill: '#666', fontSize: 10, fontFamily: 'DM Mono' }, fmtDate(recent[i].date))),
      React.createElement('line', { x1: xs(0), y1: intercept, x2: xs(n-1), y2: slope*(n-1)+intercept, stroke: '#ff6b35', strokeWidth: 1.5, strokeDasharray: '5 4', opacity: 0.7 }),
      React.createElement('path', { d: areaPath, fill: 'url(#ag)' }),
      React.createElement('path', { d: linePath, fill: 'none', stroke: '#e8ff47', strokeWidth: 2.5, strokeLinecap: 'round', strokeLinejoin: 'round' }),
      pts.map((p, i) => {
        const isToday = recent[i].date === todayStr();
        return React.createElement('circle', { key: i, cx: p[0], cy: p[1], r: isToday ? 5 : 3, fill: isToday ? '#ff6b35' : '#e8ff47' });
      })
    )
  );
}

    } catch(ex) { setErr('Error: ' + (ex.message || ex)); }

  return React.createElement('div', { className: 'auth-wrap' },
    React.createElement('div', { className: 'auth-bg' }, 'LEAN\nUP'),
    React.createElement('div', { className: 'auth-card' },
      React.createElement('div', { className: 'auth-logo' }, 'LeanUp'),

              React.createElement('div', { className: 'photo-meta' },

// ADMIN

  const [startDate, setStartDate] = useState(contest.startDate || '');

  const [msg, setMsg] = useState(''), [err, setErr] = useState(''), [saving, setSaving] = useState('');

  async function saveContest() {
    if (!startDate) { setErr('Pick a start date.'); return; }
    setSaving('contest');
    try {
      await db.update('contest', { id: 1 }, { start_date: startDate });
      await refreshAll();
      setMsg('✅ Start date saved!'); setErr(''); setTimeout(() => setMsg(''), 2500);
    } catch { setErr('Save failed.'); }
    setSaving('');
  }

  async function addUser() {
    if (!newName || !newUser || !newPass) { setErr('Fill all fields.'); return; }
    if (users.find(u => u.username === newUser)) { setErr('Username taken.'); return; }
    setSaving('user');
    try {
      await db.insert('users', { id: Date.now().toString(), username: newUser, password: newPass, role: 'user', name: newName });
      await refreshAll();
      setNewName(''); setNewUser(''); setNewPass('');
      setMsg('✅ Participant added!'); setErr(''); setTimeout(() => setMsg(''), 2500);
    } catch { setErr('Add failed - username may already exist.'); }
    setSaving('');
  }

  async function removeUser(id) {
    if (!confirm('Remove this participant and all their data?')) return;
    try {
      await db.delete('users', { id }); // cascade deletes logs + photos
      await refreshAll();
    } catch { alert('Remove failed.'); }
  }

  async function resetLogs(id) {
    if (!confirm('Reset all weigh-in logs for this user?')) return;
    try {
      await db.delete('logs', { user_id: id });
      await db.update('users', { id }, { start_weight: null });
      await refreshAll();
    } catch { alert('Reset failed.'); }

  const participants = users.filter(u => u.role !== 'admin');
  const status = getStatus(contest);

    React.createElement('div', { className: 'card' },

      ),
      msg && React.createElement('div', { style: { color: 'var(--success)', fontSize: 13, marginTop: 8 } }, msg),
      err && React.createElement('div', { className: 'err', style: { textAlign: 'left', marginTop: 8 } }, err)
    ),

    React.createElement('div', { className: 'card' },
      React.createElement('div', { className: 'card-title' }, '➕ Add Participant'),
      React.createElement('div', { className: 'input-row', style: { flexWrap: 'wrap' } },
        React.createElement('div', { className: 'field' }, React.createElement('label', null, 'Full Name'), React.createElement('input', { value: newName, onChange: e => setNewName(e.target.value), placeholder: 'John Smith' })),
        React.createElement('div', { className: 'field' }, React.createElement('label', null, 'Username'), React.createElement('input', { value: newUser, onChange: e => setNewUser(e.target.value), placeholder: 'johnsmith' })),
        React.createElement('div', { className: 'field' }, React.createElement('label', null, 'Password'), React.createElement('input', { value: newPass, onChange: e => setNewPass(e.target.value), placeholder: 'password' })),
        React.createElement('button', { className: 'btn btn-sm', onClick: addUser, style: { height: 44 }, disabled: saving === 'user' }, saving === 'user' ? 'Adding...' : 'Add')

      participants.length === 0

// SETTINGS
function Settings({ user, setUser }) {
  const [email, setEmail] = useState(user.email || '');
  const [emailMsg, setEmailMsg] = useState(''), [emailErr, setEmailErr] = useState(''), [savingEmail, setSavingEmail] = useState(false);

  const [curPass, setCurPass] = useState(''), [newPass, setNewPass] = useState(''), [confirmPass, setConfirmPass] = useState('');
  const [passMsg, setPassMsg] = useState(''), [passErr, setPassErr] = useState(''), [savingPass, setSavingPass] = useState(false);

  async function saveEmail(e) {
    e.preventDefault();
    setEmailErr(''); setEmailMsg('');
    const trimmed = email.trim();
    if (trimmed && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) { setEmailErr('Enter a valid email address.'); return; }
    setSavingEmail(true);
    try {
      await db.update('users', { id: user.id }, { email: trimmed });
      setUser(prev => ({ ...prev, email: trimmed }));
      setEmailMsg('✅ Email saved!');
      setTimeout(() => setEmailMsg(''), 3000);
    } catch { setEmailErr('Save failed - try again.'); }
    setSavingEmail(false);
  }

  async function changePassword(e) {
    e.preventDefault();
    setPassErr(''); setPassMsg('');
    if (!curPass) { setPassErr('Enter your current password.'); return; }
    if (!newPass || newPass.length < 6) { setPassErr('New password must be at least 6 characters.'); return; }
    if (newPass !== confirmPass) { setPassErr('Passwords do not match.'); return; }
    setSavingPass(true);
    try {
      // Verify current password
      const rows = await db.query('users', `?id=eq.${encodeURIComponent(user.id)}&password=eq.${encodeURIComponent(curPass)}&select=id`);
      if (!rows.length) { setPassErr('Current password is incorrect.'); setSavingPass(false); return; }
      await db.update('users', { id: user.id }, { password: newPass });
      setUser(prev => ({ ...prev, password: newPass }));
      setCurPass(''); setNewPass(''); setConfirmPass('');
      setPassMsg('✅ Password changed!');
      setTimeout(() => setPassMsg(''), 3000);
    } catch { setPassErr('Update failed - try again.'); }
    setSavingPass(false);
  }

  return React.createElement('div', null,
    React.createElement('div', { className: 'card' },
      React.createElement('div', { className: 'card-title' }, '✉️ Email Address'),
      React.createElement('p', { className: 'tip', style: { marginBottom: 16 } }, 'Add or update the email associated with your account.'),
      React.createElement('form', { onSubmit: saveEmail },
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Email'),
          React.createElement('input', { type: 'email', value: email, onChange: e => setEmail(e.target.value), placeholder: 'you@example.com' })
        ),
        emailErr && React.createElement('div', { className: 'err', style: { textAlign: 'left', marginBottom: 8 } }, emailErr),
        emailMsg && React.createElement('div', { style: { color: 'var(--success)', fontSize: 13, marginBottom: 8 } }, emailMsg),
        React.createElement('button', { className: 'btn btn-sm', type: 'submit', disabled: savingEmail }, savingEmail ? 'Saving...' : 'Save Email')
      )
    ),

    React.createElement('div', { className: 'card' },
      React.createElement('div', { className: 'card-title' }, '🔒 Change Password'),
      React.createElement('p', { className: 'tip', style: { marginBottom: 16 } }, 'Choose a new password. Must be at least 6 characters.'),
      React.createElement('form', { onSubmit: changePassword },
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Current Password'),
          React.createElement('input', { type: 'password', value: curPass, onChange: e => setCurPass(e.target.value), placeholder: '••••••••' })
        ),
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'New Password'),
          React.createElement('input', { type: 'password', value: newPass, onChange: e => setNewPass(e.target.value), placeholder: '••••••••' })
        ),
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Confirm New Password'),
          React.createElement('input', { type: 'password', value: confirmPass, onChange: e => setConfirmPass(e.target.value), placeholder: '••••••••' })
        ),
        passErr && React.createElement('div', { className: 'err', style: { textAlign: 'left', marginBottom: 8 } }, passErr),
        passMsg && React.createElement('div', { style: { color: 'var(--success)', fontSize: 13, marginBottom: 8 } }, passMsg),
        React.createElement('button', { className: 'btn btn-sm', type: 'submit', disabled: savingPass }, savingPass ? 'Updating...' : 'Change Password')
      )
    )
  );
}

// MAIN APP
function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('Dashboard');
  const [users, setUsers] = useState([]);
  const [contest, setContest] = useState({ startDate: null });
  const [logs, setLogs] = useState([]);
  const [photos, setPhotos] = useState([]);
  const [appLoading, setAppLoading] = useState(false);

  async function refreshAll() {
    const data = await loadAll();
    setUsers(data.users);
    setContest(data.contest);
    setLogs(data.logs);
    setPhotos(data.photos);
    return data;
  }

  async function handleLogin(u) {
    setUser(u);
    setAppLoading(true);
    await refreshAll();
    setAppLoading(false);
  }

  if (!user) return React.createElement(AuthScreen, { onLogin: handleLogin });

  if (appLoading) return React.createElement('div', { style: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)' } },
    React.createElement('div', { style: { fontFamily: "'Bebas Neue'", fontSize: 28, color: 'var(--accent)', letterSpacing: 2 } }, 'Loading...')
  );

  const isAdmin = user.role === 'admin';
  const currentUser = { ...user, ...(users.find(u2 => u2.id === user.id) || {}) };

  return React.createElement('div', { className: 'app' },
    React.createElement(TopBar, { user: currentUser, onLogout: () => { setUser(null); setTab('Dashboard'); }, tab, setTab, isAdmin }),
    React.createElement('div', { className: 'content' },
      tab === 'Dashboard'   && React.createElement(Dashboard,   { user: currentUser, contest, logs, users, isAdmin }),
      tab === 'My Stats'    && React.createElement(MyStats,     { user: currentUser, logs, contest }),
      tab === 'Leaderboard' && React.createElement(Leaderboard, { users, logs, currentUser, contest }),
      tab === 'Weigh-In'    && React.createElement(WeighIn,     { user: currentUser, setUser: fn => setUser(typeof fn === 'function' ? fn(user) : fn), contest, logs, refreshAll }),
      tab === 'Photos'      && React.createElement(Photos,      { user: currentUser, contest, photos, refreshAll }),
      tab === 'Admin'       && isAdmin && React.createElement(Admin, { contest, users, logs, photos, refreshAll }),
      tab === 'Settings'    && React.createElement(Settings, { user: currentUser, setUser: fn => setUser(typeof fn === 'function' ? fn(user) : fn) })
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
